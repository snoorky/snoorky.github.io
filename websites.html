    <section id="formsContainer" class="flex flex-col mx-[6vw] md:mx-[10vw] bg-gray-900 rounded-[32px] md:my-16 lg:my-20 my-8 p-8 lg:p-12">
        <div class="container text-center">
            <h2 data-translate="projectTitle" class="text-2xl font-bold text-center w-full mb-6 lg:text-[44px]"></h2>
            <p data-translate="projectDescription" class="text-lg mx-[-1rem] mb-8"></p>
            <div id="formsBox" class="p-8 rounded-xl shadow-md">
                <form action="https://formspree.io/f/xbljbdvq" method="POST" data-redirect="/index.html">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div>
                            <label data-translate="nameLabel" for="name" class="block text-sm text-left font-semibold"></label>
                            <input type="text" id="name" name="name" class="w-full mt-2 p-3 border rounded-md outline-none border-none" required />
                        </div>
                        <div>
                            <label data-translate="emailLabel" for="email" class="block text-sm text-left font-semibold"></label>
                            <input data-translate="messageLabel" type="email" id="email" name="email" class="w-full mt-2 p-3 border rounded-md outline-none border-none" required />
                        </div>
                    </div>
                    <div class="mb-6">
                        <label data-translate="messageLabel" for="message" class="block text-sm text-left font-semibold"></label>
                        <textarea id="message" name="message" rows="4" class="w-full mt-2 p-3 border rounded-md outline-none resize-none border-none" required></textarea>
                    </div>
                    <div class="mb-6">
                        <label data-translate="projectOptions" for="project" class="block text-sm text-left font-semibold"></label>
                        <div class="mt-4 flex flex-wrap">
                            <label class="inline-flex items-center mr-6">
                                <input type="radio" name="project" value="Website" class="form-radio" required />
                                <span class="ml-2">Website</span>
                            </label>
                            <label class="inline-flex items-center mr-6">
                                <input type="radio" name="project" value="E-commerce" class="form-radio" required />
                                <span class="ml-2">E-commerce</span>
                            </label>
                            <label class="inline-flex items-center mr-6">
                                <input type="radio" name="project" value="Landing Page" class="form-radio" required />
                                <span class="ml-2">Landing Page</span>
                            </label>
                            <label class="inline-flex items-center mr-6">
                                <input type="radio" name="project" value="Outro" class="form-radio" required />
                                <span data-translate="projectOthers" class="ml-2"></span>
                            </label>
                        </div>
                    </div>
                    <button data-translate="submitMessage" type="submit" class="w-full py-3 bg-[#25D366] text-white text-md font-small rounded-md hover:bg-[#128C7E] outline-none"></button>
                </form>
            </div>
        </div>
